<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THR Lebaran</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at top, #1c3b2f, #0f2027);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
    }

    /* WRAPPER BIAR TENGAH */
    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .container {
      text-align: center;
      z-index: 2;
    }

    /* BULAN */
    .moon {
      position: absolute;
      top: 80px;
      right: 80px;
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 25px white;
    }

    .moon::after {
      content: '';
      position: absolute;
      left: 20px;
      width: 80px;
      height: 80px;
      background: #0f2027;
      border-radius: 50%;
    }

    /* MASJID */
    .mosque {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 150px;
      background: url('https://i.ibb.co/2W3vYcM/mosque-silhouette.png') no-repeat center;
      background-size: cover;
      opacity: 0.3;
    }

    /* AMPlop */
    .envelope {
      width: 220px;
      height: 140px;
      background: linear-gradient(45deg, #f9c74f, #ffd166);
      position: relative;
      margin: 0 auto;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255, 209, 102, 0.5);
      animation: float 3s ease-in-out infinite;
      transition: 0.3s;
    }

    .envelope:hover {
      transform: scale(1.08);
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* FLAP */
    .flap {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #f9844a;
      clip-path: polygon(0 0, 50% 50%, 100% 0);
      transform-origin: top;
      transition: transform 0.6s ease;
    }

    /* LETTER */
    .letter {
      position: absolute;
      width: 90%;
      height: 110px;
      background: white;
      top: 20px;
      left: 5%;
      border-radius: 8px;
      transform: translateY(40px);
      opacity: 0;
      transition: all 0.6s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
      font-weight: bold;
      text-align: center;
      padding: 10px;
    }

    /* OPEN */
    .open .flap {
      transform: rotateX(180deg);
    }

    .open .letter {
      transform: translateY(-70px) scale(1.1);
      opacity: 1;
    }

    /* TEXT */
    h2 {
      margin-top: 30px;
      opacity: 0.8;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* BINTANG */
    .stars span {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      animation: twinkle 3s infinite;
    }

    @keyframes twinkle {
      0%,100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    /* FOOTER */
    .footer {
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      padding: 10px 0;
    }

    .footer span {
      color: #f9c74f;
      text-shadow: 0 0 8px rgba(249,199,79,0.8);
    }

  </style>
</head>

<body>

  <div class="main">

    <div class="moon"></div>
    <div class="mosque"></div>
    <div class="stars" id="stars"></div>

    <div class="container">
      <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="letter">Tapi BOONG 😭<br>WKWKWKKWKW</div>
      </div>

      <h2>*ketuk dua kali untuk membuka*</h2>
    </div>

  </div>

  <footer class="footer">
    © 2026 <span>Nnval</span>. All Rights Reserved.
  </footer>

  <script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      let star = document.createElement('span');
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      starsContainer.appendChild(star);
    }
  
    const envelope = document.getElementById('envelope');
  
    // Desktop (double click)
    envelope.addEventListener('dblclick', () => {
      envelope.classList.toggle('open');
    });
  
    // Mobile (tap)
    envelope.addEventListener('click', () => {
      envelope.classList.toggle('open');
    });
  </script>

</body>
</html>
